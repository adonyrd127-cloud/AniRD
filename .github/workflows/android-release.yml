name: Android Release

on:
  push:
    tags:
      - 'v*'   # Solo en tags: v4.5.0, v5.0.0, etc.

jobs:
  build-apk:
    name: Build & Sign APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release APK (prod flavor)
        working-directory: anird-android
        run: ./gradlew assembleProdRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: anird-android/app/build/outputs/apk/prod/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: anird-android/app/build/outputs/apk/prod/release/*-signed.apk
          name: "AniRD ${{ github.ref_name }}"
          body_path: CHANGELOG.md
