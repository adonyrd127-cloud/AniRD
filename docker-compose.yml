version: '3.8'

services:
  backend:
    build: ./anime1v-api
    container_name: anird-api
    ports:
      - "3005:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - API_KEYS=${API_KEYS:-dev-anime1v-key}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8090}
      - JWT_SECRET=${JWT_SECRET:?ERROR: Define JWT_SECRET en tu archivo .env}
      - LOG_LEVEL=${LOG_LEVEL:-warn}
    volumes:
      - ./anime1v-api/downloads:/app/downloads
      - ./anime1v-api/data:/app/data
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.50'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

  frontend:
    build: ./frontend
    container_name: anird-web
    ports:
      - "8090:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.20'
    restart: always
